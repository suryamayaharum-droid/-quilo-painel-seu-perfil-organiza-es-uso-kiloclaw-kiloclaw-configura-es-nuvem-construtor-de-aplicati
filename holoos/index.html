<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoloOS v0.7.0 - Super Inteligencia</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            background: #000000;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            overflow: hidden;
        }
        
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0.1) 0px,
                rgba(0,0,0,0.1) 1px,
                transparent 1px,
                transparent 3px
            );
            pointer-events: none;
            z-index: 1000;
        }
        
        .glow {
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 5px #00ff88; }
            to { text-shadow: 0 0 20px #00ff88, 0 0 30px #00ff88; }
        }
        
        .logo {
            font-size: 2em;
            text-align: center;
            padding: 20px;
            letter-spacing: 15px;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            border-bottom: 1px solid #00ff88;
            font-size: 0.9em;
        }
        
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
        }
        
        .info {
            text-align: center;
            line-height: 2;
        }
        
        .modules {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px;
            max-width: 800px;
        }
        
        .module {
            padding: 10px;
            border: 1px solid #003322;
            text-align: center;
            transition: all 0.3s;
        }
        
        .module:hover {
            border-color: #00ff88;
            background: rgba(0,255,136,0.1);
        }
        
        .module.online {
            border-color: #00ff88;
        }
        
        .module.online::before {
            content: '● ';
            color: #00ff88;
        }
        
        .terminal {
            width: 100%;
            max-width: 600px;
            border: 1px solid #003322;
            padding: 15px;
            background: rgba(0,20,10,0.5);
        }
        
        .terminal-output {
            height: 150px;
            overflow-y: auto;
            margin-bottom: 10px;
            font-size: 0.85em;
            line-height: 1.6;
        }
        
        .terminal-input {
            display: flex;
            gap: 10px;
        }
        
        .terminal-input input {
            flex: 1;
            background: #000;
            border: 1px solid #003322;
            color: #00ff88;
            padding: 10px;
            font-family: inherit;
            outline: none;
        }
        
        .terminal-input input:focus {
            border-color: #00ff88;
        }
        
        .terminal-input button {
            background: #003322;
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
        }
        
        .terminal-input button:hover {
            background: #00ff88;
            color: #000;
        }
        
        .footer {
            text-align: center;
            padding: 10px;
            font-size: 0.8em;
            color: #006644;
        }
    </style>
</head>
<body>
    <div class="screen">
        <div class="scanlines"></div>
        
        <div class="logo glow">HOLOOS</div>
        
        <div class="status-bar">
            <span>v0.7.0</span>
            <span id="time">--:--:--</span>
            <span>READY</span>
        </div>
        
        <div class="main">
            <div class="info glow">
                <div>SUPER INTELIGENCIA NATIVA</div>
                <div style="font-size: 0.8em; color: #006644;">17 Models | 46 Files | 12 Modules</div>
            </div>
            
            <div class="modules">
                <div class="module online">KERNEL</div>
                <div class="module online">AI HUB</div>
                <div class="module online">SECURITY</div>
                <div class="module online">MEMORY</div>
                <div class="module online">PLANNER</div>
                <div class="module online">TOOLS</div>
                <div class="module online">GATEWAY</div>
                <div class="module online">DATABASE</div>
                <div class="module online">MONITORING</div>
                <div class="module online">PLUGINS</div>
                <div class="module online">CONFIG</div>
                <div class="module online">GOVERNANCE</div>
            </div>
            
            <div class="terminal">
                <div class="terminal-output" id="output">
                    <div>HoloOS v0.7.0 initialized</div>
                    <div>All systems online. Ready.</div>
                </div>
                <div class="terminal-input">
                    <input type="text" id="cmd" placeholder="Command..." onkeypress="handleEnter(event)">
                    <button onclick="execute()">EXEC</button>
                </div>
            </div>
        </div>
        
        <div class="footer">
            46 Python Files | Multi-Language | Self-Aware Architecture
        </div>
    </div>
    
    <script>
        const responses = {
            'help': 'Commands: ai, kernel, security, memory, planning, tools, gateway, database, status, clear, reboot',
            'ai': '17 AI Models: GPT-4, Claude, Gemini, Llama 3, Mistral, Whisper, DALL-E, Stable Diffusion',
            'kernel': 'Self-Attention: 6 layers, 12 heads, 768d | Soul: Identity, Beliefs | Consciousness: GWS, IIT',
            'security': 'Threat Detection (8 types), IPS, Policy Engine, AES-256 Encryption, Audit Log',
            'memory': 'Semantic (768d), Episodic, Working (7 slots), Procedural. Vector search enabled.',
            'planning': 'Goal Decomposition, Reasoning (CoT, ToT, ReAct), Autonomous planning',
            'tools': '9 Tools: Python, Bash, Search, File I/O, HTTP, JSON',
            'gateway': 'Rate Limiting, API Key Auth, JWT, Request Cache',
            'database': 'SQL Tables, NoSQL Documents, Key-Value Store',
            'status': 'All 12 modules ONLINE | System nominal',
            'reboot': 'System reboot initiated...',
            'clear': 'clear'
        };
        
        function updateTime() {
            const now = new Date();
            document.getElementById('time').textContent = now.toTimeString().split(' ')[0];
        }
        setInterval(updateTime, 1000);
        updateTime();
        
        function handleEnter(e) {
            if (e.key === 'Enter') execute();
        }
        
        function execute() {
            const input = document.getElementById('cmd');
            const cmd = input.value.trim().toLowerCase();
            const output = document.getElementById('output');
            
            if (cmd === 'clear') {
                output.innerHTML = '<div>Terminal cleared.</div>';
            } else if (cmd !== '') {
                const response = responses[cmd] || 'Command not recognized. Type "help" for available commands.';
                output.innerHTML += '<div>> ' + cmd + '</div>';
                output.innerHTML += '<div style="color:#00ffcc">' + response + '</div>';
            }
            
            input.value = '';
            output.scrollTop = output.scrollHeight;
        }
    </script>
</body>
</html>
